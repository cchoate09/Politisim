<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./brand/app-icon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d223b" />
    <meta name="description" content="Run a modern U.S. presidential campaign through the primary, convention, and general election." />
    <title>PolitiSim</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html, body, #root {
        margin: 0;
        min-height: 100%;
        background: #07111e;
      }

      body {
        font-family: Georgia, "Times New Roman", serif;
      }

      .boot-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, #07111e, #091726);
      }

      .boot-art {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.52;
      }

      .boot-panel {
        position: relative;
        z-index: 1;
        width: min(560px, calc(100% - 48px));
        padding: 32px 32px 28px;
        border-radius: 28px;
        background: rgba(6, 12, 22, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        color: #f8fafc;
      }

      .boot-kicker {
        margin: 0 0 10px;
        font-size: 12px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(248, 250, 252, 0.66);
      }

      .boot-title {
        margin: 0;
        font-size: clamp(40px, 7vw, 72px);
        line-height: 0.95;
      }

      .boot-copy {
        margin: 16px 0 18px;
        max-width: 32rem;
        font-size: 16px;
        line-height: 1.7;
        color: rgba(248, 250, 252, 0.8);
      }

      .boot-meter {
        position: relative;
        height: 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }

      .boot-meter::before {
        content: "";
        position: absolute;
        inset: 0;
        transform-origin: left center;
        animation: politisim-boot 1.6s ease-in-out infinite;
        background: linear-gradient(90deg, #4fd2e0, #f6c453, #f35a50);
      }

      .boot-meta {
        margin-top: 16px;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(248, 250, 252, 0.6);
      }

      @keyframes politisim-boot {
        0% { transform: scaleX(0.12); opacity: 0.55; }
        50% { transform: scaleX(0.72); opacity: 1; }
        100% { transform: scaleX(0.18); opacity: 0.6; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <img class="boot-art" src="./brand/launch-splash.svg" alt="" aria-hidden="true" />
        <div class="boot-panel">
          <p class="boot-kicker">Campaign Simulation</p>
          <h1 class="boot-title">PolitiSim</h1>
          <p class="boot-copy">Loading the command center, briefing the war room, and preparing the next national map.</p>
          <div class="boot-meter"></div>
          <div class="boot-meta">Building the launch-day board</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
